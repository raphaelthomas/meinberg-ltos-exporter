version: 2
project_name: meinberg-ltos-exporter

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.Revision={{.FullCommit}}
      - -X main.Branch={{.Branch}}
      - -X main.BuildDate={{.Date}}

archives:
  - formats: [ 'tar.gz' ]
    name_template: "{{ .ProjectName }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}"

changelog:
  use: git
  sort: asc
  groups:
    - title: '🚀 Features'
      regexp: '^.*feat[(\w)]*:+.*'
      order: 0
    - title: '🐞 Bug Fixes'
      regexp: '^.*fix[(\w)]*:+.*'
      order: 1
